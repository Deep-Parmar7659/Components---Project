<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Landing Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HERO -->
    <section class="hero">
      <h1>Build Better Products Faster 🚀</h1>
      <p>All-in-one SaaS platform to manage workflow.</p>
      <div class="buttons">
        <button class="primary">Get Started</button>
        <button class="secondary">Live Demo</button>
      </div>
    </section>

    <!-- FEATURES -->
    <section class="features">
      <h2>Powerful Features</h2>
      <div class="grid">
        <div class="card">
          <h3>Analytics</h3>
          <p>Track performance easily.</p>
        </div>
        <div class="card">
          <h3>Automation</h3>
          <p>Save time with automation.</p>
        </div>
        <div class="card">
          <h3>Collaboration</h3>
          <p>Work with your team.</p>
        </div>
      </div>
    </section>

    <!-- PRICING -->
    <section class="pricing">
      <h2>Pricing</h2>
      <div class="grid">
        <div class="card">
          <h3>Basic</h3>
          <p>$9/mo</p>
        </div>
        <div class="card">
          <h3>Pro</h3>
          <p>$29/mo</p>
        </div>
        <div class="card">
          <h3>Enterprise</h3>
          <p>$99/mo</p>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="cta">
      <h2>Start your journey today</h2>
      <button>Get Started Free</button>
    </section>
  </body>
</html>
